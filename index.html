<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un ano juntos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #1b120f;
    color: #fff7ee;
    font-family: 'Poppins', Arial, Helvetica, sans-serif;
    overflow-x: hidden;
  }

  .titulo {
    font-family: 'Playfair Display', Georgia, 'Times New Roman', serif;
  }

  .pantalla {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 20px;
    box-sizing: border-box;
    opacity: 0;
    transition: opacity 0.9s ease-in-out;
  }

  .pantalla.visible {
    display: flex;
  }

  .pantalla.mostrando {
    opacity: 1;
  }

  /* Pantalla 1: portada */
  #pantalla-portada {
    background-color: #2a1810;
    background-image: linear-gradient(rgba(20,10,8,0.55), rgba(20,10,8,0.75)), url('photo-09.jpg');
    background-size: cover;
    background-position: center;
  }

  .eyebrow {
    font-family: 'Poppins', Arial, sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f9e7c0;
    margin-bottom: 30px;
  }

  #boton-entrar {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 24px;
    color: #2a1810;
    background-color: #ffb88c;
    background-image: linear-gradient(135deg, #f9e7c0, #ffb88c, #ff6f9c);
    border: none;
    padding: 20px 44px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    margin-bottom: 20px;
    letter-spacing: 0.3px;
  }

  #boton-entrar:active {
    transform: scale(0.97);
  }

  .subtexto {
    font-family: 'Poppins', Arial, sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: #fff7ee;
    opacity: 0.7;
    letter-spacing: 0.5px;
  }

  /* Pantalla 2: mensaje inicial */
  #pantalla-mensaje {
    background-color: #1b120f;
    overflow: hidden;
  }

  .fondo-mensaje {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('photo-01.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(22px);
    transform: scale(1.15);
  }

  .velo-mensaje {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(20,10,8,0.6);
  }

  .mensaje-grande {
    position: relative;
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 600;
    font-size: 42px;
    line-height: 1.45;
    color: #fff7ee;
    font-style: italic;
    max-width: 720px;
    text-shadow: 0 6px 24px rgba(0,0,0,0.55);
  }

  /* Pantalla 3: galeria (a pantalla completa) */
  #pantalla-galeria {
    background-color: #000;
    padding: 0;
  }

  #contenedor-slide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
  }

  #contenedor-slide.mostrando {
    opacity: 1;
  }

  .fondo-foto-borroso {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: blur(28px);
    transform: scale(1.15);
  }

  .foto-completa {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    z-index: 1;
  }

  .velo-foto {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(0,0,0,0) 70%, rgba(0,0,0,0.55) 100%);
    z-index: 2;
  }

  .fondo-texto {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    filter: blur(18px);
    transform: scale(1.1);
  }

  .velo-texto {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(20,10,8,0.55);
  }

  .caja-texto {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    box-sizing: border-box;
  }

  .caja-texto p {
    position: relative;
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 600;
    font-size: 30px;
    font-style: italic;
    color: #fff7ee;
    line-height: 1.45;
    margin: 0;
    max-width: 640px;
    text-shadow: 0 4px 18px rgba(0,0,0,0.6);
  }

  .controles {
    position: absolute;
    bottom: 28px;
    left: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 5;
  }

  .boton-flecha {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1px solid rgba(255,247,238,0.35);
    background-color: rgba(30,18,14,0.45);
    backdrop-filter: blur(6px);
    color: #fff7ee;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }

  .boton-flecha:disabled {
    opacity: 0.25;
    cursor: default;
  }

  .contador {
    font-family: 'Poppins', Arial, sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: #fff7ee;
    opacity: 0.9;
    min-width: 50px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  .ayuda {
    margin-top: 14px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff7ee;
    opacity: 0.4;
  }

  /* Pantalla final: invitacion al sushi */
  #pantalla-sushi {
    background-color: #1b120f;
    overflow: hidden;
  }

  .fondo-sushi {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('photo-14.jpg');
    background-size: cover;
    background-position: center;
    filter: blur(24px);
    transform: scale(1.15);
  }

  .velo-sushi {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(20,10,8,0.62);
  }

  .tarjeta-sushi {
    position: relative;
    background-color: rgba(42,24,16,0.55);
    border: 1px solid rgba(255,247,238,0.25);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 44px 36px;
    max-width: 420px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }

  .titulo-sushi {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 600;
    font-style: italic;
    font-size: 28px;
    color: #fff7ee;
    line-height: 1.4;
    margin: 0 0 10px 0;
  }

  .detalle-sushi {
    font-family: 'Poppins', Arial, sans-serif;
    font-weight: 400;
    font-size: 16px;
    color: #f9e7c0;
    line-height: 1.6;
    margin: 0 0 28px 0;
  }

  #boton-confirmar {
    font-family: 'Poppins', Arial, sans-serif;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.5px;
    color: #2a1810;
    background-image: linear-gradient(135deg, #f9e7c0, #ffb88c, #ff6f9c);
    border: none;
    padding: 16px 38px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 26px rgba(0,0,0,0.4);
  }

  #boton-confirmar:active {
    transform: scale(0.97);
  }

  .mensaje-gracias {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 600;
    font-style: italic;
    font-size: 24px;
    color: #fff7ee;
    margin: 0;
    display: none;
  }

  .mensaje-gracias.visible-gracias {
    display: block;
  }

  .tarjeta-sushi.confirmado .contenido-sushi {
    display: none;
  }
</style>
</head>
<body>

<!-- PANTALLA 1: PORTADA -->
<div class="pantalla visible mostrando" id="pantalla-portada">
  <div class="eyebrow">17 de junio - un ano juntos</div>
  <button id="boton-entrar" type="button" onclick="abrirMensaje()">Para "Avril Fenoglio"</button>
  <div class="subtexto">toca para abrir</div>
</div>

<!-- PANTALLA 2: MENSAJE INICIAL -->
<div class="pantalla" id="pantalla-mensaje">
  <div class="fondo-mensaje"></div>
  <div class="velo-mensaje"></div>
  <p class="mensaje-grande">🤍 Feliz aniversario mi amor!!! 🤍<br>Te super amo!!! 🌷🌷</p>
</div>

<!-- PANTALLA 3: GALERIA -->
<div class="pantalla" id="pantalla-galeria">
  <div id="contenedor-slide"></div>
  <div class="controles">
    <button class="boton-flecha" id="btn-anterior" type="button" onclick="irAnterior()">&#8249;</button>
    <span class="contador" id="texto-contador">1 / 22</span>
    <button class="boton-flecha" id="btn-siguiente" type="button" onclick="irSiguiente()">&#8250;</button>
  </div>
</div>

<!-- PANTALLA 4: INVITACION AL SUSHI -->
<div class="pantalla" id="pantalla-sushi">
  <div class="fondo-sushi"></div>
  <div class="velo-sushi"></div>
  <div class="tarjeta-sushi" id="tarjeta-sushi">
    <div class="contenido-sushi" id="contenido-sushi">
      <p class="titulo-sushi">🌷 Te veo en un ratito en casita 🌷</p>
      <p class="detalle-sushi">Hoy 8:30 tenemos reserva de sushi 🤍</p>
      <button id="boton-confirmar" type="button" onclick="confirmarSushi()">Confirmar</button>
    </div>
    <p class="mensaje-gracias" id="mensaje-gracias">Te espero, te amo 🤍🌷</p>
  </div>
</div>

<script>
  // ---------------------------------------------------------
  // Construccion de la lista de diapositivas
  // ---------------------------------------------------------
  var totalFotos = 20;
  var mensajeMedio = "Que la vida siempre nos encuentre sonriendo, disfrutando y siendo feliz, te amo mi princesaaa!!!";
  var mensajeFinal = "Para toda la vida!!";
  var posicionMedio = 10;

  function nombreFoto(numero) {
    var texto = numero < 10 ? "0" + numero : "" + numero;
    return "photo-" + texto + ".jpg";
  }

  var slides = [];
  for (var i = 1; i <= totalFotos; i++) {
    slides.push({ tipo: "foto", archivo: nombreFoto(i) });
    if (i === posicionMedio) {
      slides.push({ tipo: "texto", mensaje: mensajeMedio, fondo: nombreFoto(i) });
    }
  }
  slides.push({ tipo: "texto", mensaje: mensajeFinal, fondo: nombreFoto(totalFotos) });

  var indiceActual = 0;

  // ---------------------------------------------------------
  // Funciones de pantalla (con transicion animada de opacidad)
  // ---------------------------------------------------------
  function mostrarPantalla(idPantalla) {
    var pantallas = document.getElementsByClassName("pantalla");
    var i;
    for (i = 0; i < pantallas.length; i++) {
      pantallas[i].classList.remove("visible");
      pantallas[i].classList.remove("mostrando");
    }
    var destino = document.getElementById(idPantalla);
    destino.classList.add("visible");
    setTimeout(function () {
      destino.classList.add("mostrando");
    }, 20);
  }

  function abrirMensaje() {
    mostrarPantalla("pantalla-mensaje");
    setTimeout(function () {
      mostrarPantalla("pantalla-galeria");
      dibujarSlideActual();
    }, 2800);
  }

  // ---------------------------------------------------------
  // Funciones de galeria
  // ---------------------------------------------------------
  function dibujarSlideActual() {
    var contenedor = document.getElementById("contenedor-slide");
    var slide = slides[indiceActual];

    // animacion: bajamos la opacidad, cambiamos el contenido, y la volvemos a subir
    contenedor.classList.remove("mostrando");

    setTimeout(function () {
      contenedor.innerHTML = "";

      if (slide.tipo === "foto") {
        var fondoBorroso = document.createElement("div");
        fondoBorroso.className = "fondo-foto-borroso";
        fondoBorroso.style.backgroundImage = "url('" + slide.archivo + "')";
        contenedor.appendChild(fondoBorroso);

        var img = document.createElement("img");
        img.className = "foto-completa";
        img.src = slide.archivo;
        img.alt = "Foto de los dos";
        contenedor.appendChild(img);

        var velo = document.createElement("div");
        velo.className = "velo-foto";
        contenedor.appendChild(velo);
      } else {
        var fondo = document.createElement("div");
        fondo.className = "fondo-texto";
        fondo.style.backgroundImage = "url('" + slide.fondo + "')";
        contenedor.appendChild(fondo);

        var veloTexto = document.createElement("div");
        veloTexto.className = "velo-texto";
        contenedor.appendChild(veloTexto);

        var caja = document.createElement("div");
        caja.className = "caja-texto";
        var p = document.createElement("p");
        p.textContent = slide.mensaje;
        caja.appendChild(p);
        contenedor.appendChild(caja);
      }

      setTimeout(function () {
        contenedor.classList.add("mostrando");
      }, 20);
    }, 280);

    document.getElementById("texto-contador").textContent = (indiceActual + 1) + " / " + slides.length;
    document.getElementById("btn-anterior").disabled = (indiceActual === 0);
  }

  function irAnterior() {
    if (indiceActual > 0) {
      indiceActual = indiceActual - 1;
      dibujarSlideActual();
    }
  }

  function irSiguiente() {
    if (indiceActual < slides.length - 1) {
      indiceActual = indiceActual + 1;
      dibujarSlideActual();
    } else {
      mostrarPantalla("pantalla-sushi");
    }
  }

  function confirmarSushi() {
    document.getElementById("contenido-sushi").style.display = "none";
    document.getElementById("mensaje-gracias").classList.add("visible-gracias");
  }

  // soporte basico de teclado
  document.addEventListener("keydown", function (evento) {
    var galeriaVisible = document.getElementById("pantalla-galeria").classList.contains("visible");
    if (!galeriaVisible) { return; }
    if (evento.key === "ArrowRight") { irSiguiente(); }
    if (evento.key === "ArrowLeft") { irAnterior(); }
  });

  // soporte basico de swipe en pantallas tactiles
  var inicioX = null;
  document.getElementById("pantalla-galeria").addEventListener("touchstart", function (evento) {
    inicioX = evento.touches[0].clientX;
  });
  document.getElementById("pantalla-galeria").addEventListener("touchend", function (evento) {
    if (inicioX === null) { return; }
    var finX = evento.changedTouches[0].clientX;
    var diferencia = finX - inicioX;
    if (diferencia > 40) { irAnterior(); }
    if (diferencia < -40) { irSiguiente(); }
    inicioX = null;
  });
</script>

</body>
</html>
