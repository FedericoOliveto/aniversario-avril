<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un ano juntos</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #1b120f;
    color: #fff7ee;
    font-family: Georgia, 'Times New Roman', serif;
    overflow-x: hidden;
  }

  .pantalla {
    display: none;
    min-height: 100vh;
    width: 100%;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 20px;
    box-sizing: border-box;
  }

  .pantalla.visible {
    display: flex;
  }

  /* Pantalla 1: portada */
  #pantalla-portada {
    background-color: #2a1810;
    background-image: linear-gradient(rgba(20,10,8,0.55), rgba(20,10,8,0.75)), url('photo-09.jpg');
    background-size: cover;
    background-position: center;
  }

  .eyebrow {
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #f9e7c0;
    margin-bottom: 30px;
  }

  #boton-entrar {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 24px;
    color: #2a1810;
    background-color: #ffb88c;
    background-image: linear-gradient(135deg, #f9e7c0, #ffb88c, #ff6f9c);
    border: none;
    padding: 20px 40px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    margin-bottom: 20px;
  }

  #boton-entrar:active {
    transform: scale(0.97);
  }

  .subtexto {
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #fff7ee;
    opacity: 0.7;
  }

  /* Pantalla 2: mensaje inicial */
  #pantalla-mensaje {
    background-color: #1b120f;
  }

  .mensaje-grande {
    font-size: 38px;
    line-height: 1.4;
    color: #f6d365;
    font-style: italic;
    max-width: 700px;
  }

  /* Pantalla 3: galeria */
  #pantalla-galeria {
    background-color: #1b120f;
  }

  .marco-foto {
    width: 90vw;
    max-width: 480px;
    height: 60vh;
    max-height: 600px;
    border-radius: 16px;
    overflow: hidden;
    background-color: #000;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .marco-foto img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .marco-texto {
    width: 90vw;
    max-width: 480px;
    height: 60vh;
    max-height: 600px;
    border-radius: 16px;
    background-color: #2a1810;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 30px;
    box-sizing: border-box;
  }

  .marco-texto p {
    font-size: 26px;
    font-style: italic;
    color: #f6d365;
    line-height: 1.4;
    margin: 0;
  }

  .controles {
    margin-top: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .boton-flecha {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 1px solid rgba(255,247,238,0.3);
    background-color: rgba(255,247,238,0.08);
    color: #fff7ee;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
  }

  .boton-flecha:disabled {
    opacity: 0.25;
    cursor: default;
  }

  .contador {
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #fff7ee;
    opacity: 0.7;
    min-width: 50px;
  }

  .ayuda {
    margin-top: 14px;
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff7ee;
    opacity: 0.4;
  }
</style>
</head>
<body>

<!-- PANTALLA 1: PORTADA -->
<div class="pantalla visible" id="pantalla-portada">
  <div class="eyebrow">17 de junio - un ano juntos</div>
  <button id="boton-entrar" type="button" onclick="abrirMensaje()">Para "Avril Fenoglio"</button>
  <div class="subtexto">toca para abrir</div>
</div>

<!-- PANTALLA 2: MENSAJE INICIAL -->
<div class="pantalla" id="pantalla-mensaje">
  <p class="mensaje-grande">Feliz aniversario mi amor!!!<br>Te super amo!!!</p>
</div>

<!-- PANTALLA 3: GALERIA -->
<div class="pantalla" id="pantalla-galeria">
  <div id="contenedor-slide"></div>
  <div class="controles">
    <button class="boton-flecha" id="btn-anterior" type="button" onclick="irAnterior()">&#8249;</button>
    <span class="contador" id="texto-contador">1 / 22</span>
    <button class="boton-flecha" id="btn-siguiente" type="button" onclick="irSiguiente()">&#8250;</button>
  </div>
  <div class="ayuda">usa las flechas para avanzar</div>
</div>

<script>
  // ---------------------------------------------------------
  // Construccion de la lista de diapositivas
  // ---------------------------------------------------------
  var totalFotos = 20;
  var mensajeMedio = "Que la vida siempre nos encuentre sonriendo, disfrutando y siendo feliz, te amo mi princesaaa!!!";
  var mensajeFinal = "Para toda la vida!!";
  var posicionMedio = 10;

  var slides = [];
  for (var i = 1; i <= totalFotos; i++) {
    var numero = i < 10 ? "0" + i : "" + i;
    slides.push({ tipo: "foto", archivo: "photo-" + numero + ".jpg" });
    if (i === posicionMedio) {
      slides.push({ tipo: "texto", mensaje: mensajeMedio });
    }
  }
  slides.push({ tipo: "texto", mensaje: mensajeFinal });

  var indiceActual = 0;

  // ---------------------------------------------------------
  // Funciones de pantalla
  // ---------------------------------------------------------
  function mostrarPantalla(idPantalla) {
    var pantallas = document.getElementsByClassName("pantalla");
    for (var i = 0; i < pantallas.length; i++) {
      pantallas[i].classList.remove("visible");
    }
    document.getElementById(idPantalla).classList.add("visible");
  }

  function abrirMensaje() {
    mostrarPantalla("pantalla-mensaje");
    setTimeout(function () {
      mostrarPantalla("pantalla-galeria");
      dibujarSlideActual();
    }, 2800);
  }

  // ---------------------------------------------------------
  // Funciones de galeria
  // ---------------------------------------------------------
  function dibujarSlideActual() {
    var contenedor = document.getElementById("contenedor-slide");
    var slide = slides[indiceActual];
    contenedor.innerHTML = "";

    if (slide.tipo === "foto") {
      var marco = document.createElement("div");
      marco.className = "marco-foto";
      var img = document.createElement("img");
      img.src = slide.archivo;
      img.alt = "Foto de los dos";
      marco.appendChild(img);
      contenedor.appendChild(marco);
    } else {
      var marcoTexto = document.createElement("div");
      marcoTexto.className = "marco-texto";
      var p = document.createElement("p");
      p.textContent = slide.mensaje;
      marcoTexto.appendChild(p);
      contenedor.appendChild(marcoTexto);
    }

    document.getElementById("texto-contador").textContent = (indiceActual + 1) + " / " + slides.length;
    document.getElementById("btn-anterior").disabled = (indiceActual === 0);
    document.getElementById("btn-siguiente").disabled = (indiceActual === slides.length - 1);
  }

  function irAnterior() {
    if (indiceActual > 0) {
      indiceActual = indiceActual - 1;
      dibujarSlideActual();
    }
  }

  function irSiguiente() {
    if (indiceActual < slides.length - 1) {
      indiceActual = indiceActual + 1;
      dibujarSlideActual();
    }
  }

  // soporte basico de teclado
  document.addEventListener("keydown", function (evento) {
    var galeriaVisible = document.getElementById("pantalla-galeria").classList.contains("visible");
    if (!galeriaVisible) { return; }
    if (evento.key === "ArrowRight") { irSiguiente(); }
    if (evento.key === "ArrowLeft") { irAnterior(); }
  });
</script>

</body>
</html>
